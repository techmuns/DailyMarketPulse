name: Deploy to Cloudflare

# Builds the SPA and deploys the Worker (worker/index.ts) together with its
# static assets (./dist) using `wrangler deploy`, per wrangler.toml. This keeps
# the /api/* routes (tts, stock search, quotes) — a Pages-only deploy would drop them.
#
# Requires two repository secrets:
#   CLOUDFLARE_API_TOKEN   — token with "Workers Scripts: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID
#
# Push to `using-skills` deploys automatically; workflow_dispatch lets you
# trigger it manually from any branch via the GitHub UI.
on:
  push:
    branches:
      - using-skills
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
